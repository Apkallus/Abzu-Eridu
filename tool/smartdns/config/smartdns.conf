# github 项目 https://pymumu.github.io/smartdns/

# 修改 dns 为本机
# ipv4 127.0.0.1
# ipv6 ::1

# 本地 DNS 服务器仅监听 UDP 53端口
bind [::]:53

####### 仪表盘 
# 添加仪表盘插件
plugin smartdns_ui.so
# 设置仪表盘服务端口号
smartdns-ui.ip http://[::]:6080
# 设置仪表盘数据文件保存路径
data-dir /var/lib/smartdns
#######

####### 缓存 
# 持久化缓存，测试时关闭
cache-persist yes

# 缓存文件保存路径，缓存大小自动设置
cache-file /var/lib/smartdns/cache
# cache 文件保存到硬盘周期，3小时
cache-checkpoint-time 10800

# 查询条目过期时长，30分钟
rr-ttl-min 1800

# 过期缓存 
## 开启过期缓存，返回过期缓存的同时进行查询
serve-expired yes
## 过期缓存超时删除时间，3天
serve-expired-ttl 259200
## 过期缓存响应时间，3秒
serve-expired-reply-ttl 3
## 过期缓存预获取及其触发时间，6小时
prefetch-domain yes
serve-expired-prefetch-time 21600
####### 

####### 测速
# 开启双栈优选
dualstack-ip-selection yes
# 仅使用 ping 测速
speed-check-mode ping
####### 

# 若不保留任何数字 ip dns 服务器端点，将导致字符串 dns 端点本身无法被解析

####### 中国域名解析
# https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/direct-list.txt
# 域名解析列表 direct-list，包含 china-list 与 google-cn
# google-cn 包含（而 china-list 不含） google 验证码 www.recaptcha.net (虽然部分国际 DNS 能够返回可用地址)

# 使用方式：在任何使用 domain 的位置，替换为 /domain-set:[name]/
# 加载域名列表文件，设置为域名集合
domain-set -name cn_domain_set -type list -file /etc/smartdns/direct-list.txt 

# 公共 CDN
# 基于 UDP 的 UDP/DOQ 快速解析
## 阿里，似乎为拦截版
#= server 223.6.6.6 -group cn_dns_group -exclude-default-group
#= server 2400:3200::1 -group cn_dns_group -exclude-default-group
server-quic 223.5.5.5 -group cn_dns_group -exclude-default-group -host-name dns.alidns.com
server-quic 2400:3200:baba::1 -group cn_dns_group -exclude-default-group -host-name dns.alidns.com
## 腾讯 ipv6 连接不佳，似乎为拦截版
#- server 119.29.29.29 -group cn_dns_group -exclude-default-group
## onedns.net，仅提供拦截版
server 117.50.22.22 -group cn_dns_group -exclude-default-group
server 2400:7fc0:849e:200::4 -group cn_dns_group -exclude-default-group

# 设置中国域名集合与 DNS 服务器组的映射
domain-rules /domain-set:cn_domain_set/ -nameserver cn_dns_group
