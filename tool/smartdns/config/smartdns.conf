# 减少端点总数
## `#=` 注释掉可用的重复端点，
## `#-` 注释掉延迟稍高或成功率稍低的端点

# 保留不同解析结果的独特端点以增加潜在 IP
# 使用未过滤的 DNS 服务器，而不是拦截/过滤 DNS 请求或劫持 DNS 到警告页面的 DNS 服务器

####### 基于 UDP 的 DOH3/DOQ 快速解析
# DOH3 
## quad9.net，9/11为过滤版。文档：<https://docs.quad9.net/services/>
#= server-h3 h3://dns10.quad9.net/dns-query
#= server-h3 h3://dns12.quad9.net/dns-query
## 其他
#- server-h3 h3://dns.kescher.at/dns-query
server-h3 h3://v.recipes/dns-query

# DOQ
## 不支持非默认的 dns-query 的其他 url 端点控制
## dns9.quad9.net
### dns10.quad9.net
server-quic 149.112.112.10
server-quic 2620:fe::10
#- server-quic dns12.quad9.net
## ffmuc.net 各种查询类型子域均解析到同一 ip
#- server-quic 5.1.66.255
#- server-quic 2001:678:e68:f000::
## anycast.dns.nextdns.io
server-quic 45.90.28.0
#- server-quic 2a07:a8c1::
## 其他
#= server-quic dns.kescher.at
#- server-quic dns.surfsharkdns.com

## [特异] 能够解析到可用 google 验证码地址
server-quic doh.dns4all.eu
server-quic dns.caliph.dev
